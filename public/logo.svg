<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="white" flood-opacity="0.15"/>
      <feComposite operator="in" in2="SourceGraphic"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" opacity="0.9"/>

  <!-- Icon: Node/Network Symbol (simplified infinity/knot) -->
  <g transform="translate(256, 220)" filter="url(#innerShadow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="70" stroke="white" stroke-width="10" fill="none" opacity="0.3"/>
    <!-- Inner connected nodes -->
    <circle cx="-30" cy="-20" r="18" fill="white" opacity="0.9"/>
    <circle cx="30" cy="-20" r="18" fill="white" opacity="0.9"/>
    <circle cx="0" cy="30" r="18" fill="white" opacity="0.9"/>
    <!-- Connection lines -->
    <line x1="-30" y1="-20" x2="30" y2="-20" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <line x1="-30" y1="-20" x2="0" y2="30" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <line x1="30" y1="-20" x2="0" y2="30" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Text: MiSub -->
  <text x="256" y="370" text-anchor="middle" font-family="'Outfit','Plus Jakarta Sans',sans-serif" font-weight="700" font-size="72" fill="white" letter-spacing="-0.02em">
    MiSub
  </text>

  <!-- Subtle dot accent -->
  <circle cx="380" cy="358" r="5" fill="#c4b5fd"/>
</svg>
